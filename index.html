<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Gap Analysis Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    
    <header>
        <div class="logo">
            <span class="highlight">SG</span> GAP ANALYSIS
        </div>
        <div class="stats-bar" id="summary-stats">
            <!-- Stats will be injected here -->
        </div>
    </header>

    <main>
        <section class="filters">
            <div class="search-box">
                <input type="text" id="search" placeholder="Search product, brand or SWOT category...">
            </div>
            <div class="filter-chips" id="brand-filters">
                <button class="chip active" data-filter="brand" data-val="all">All Brands</button>
                <button class="chip" data-filter="brand" data-val="Guardian">Guardian</button>
                <button class="chip" data-filter="brand" data-val="Asahi">Asahi</button>
            </div>
            <div class="filter-chips" id="swot-filters">
                <button class="chip active" data-filter="swot" data-val="all">All SWOT</button>
                <button class="chip strength" data-filter="swot" data-val="Strength">Strengths</button>
                <button class="chip weakness" data-filter="swot" data-val="Weakness">Weaknesses</button>
                <button class="chip opportunity" data-filter="swot" data-val="Opportunity">Opportunities</button>
                <button class="chip threat" data-filter="swot" data-val="Threat">Threats</button>
            </div>
        </section>

        <section class="gap-grid" id="gap-container">
            <!-- Gap cards will be injected here -->
            <div class="loader">Analyzing Market Gaps...</div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
